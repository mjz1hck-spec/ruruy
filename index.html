<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>儒儒</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=Noto+Sans+SC:wght@300;400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; color: #111; font-family: 'Noto Sans SC', 'PingFang SC', sans-serif; font-weight: 300; min-height: 100vh; }
  nav { position: fixed; top: 0; left: 0; right: 0; height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; background: #fff; border-bottom: 1px solid #e8e8e8; z-index: 100; }
  .site-name { font-family: 'Noto Serif SC', serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.15em; cursor: pointer; color: #111; }
  .write-link { font-size: 0.78rem; color: #999; background: none; border: none; font-family: inherit; cursor: pointer; padding: 0.3rem 0.6rem; border-radius: 3px; }
  .page { display: none; } .page.active { display: block; }
  .list-wrap { padding-top: 52px; }
  .article-entry { padding: 3.5rem 2rem; border-bottom: 1px solid #ebebeb; cursor: pointer; text-align: center; }
  .article-entry:hover { background: #fafafa; }
  .entry-title { font-family: 'Noto Serif SC', serif; font-size: clamp(1.3rem, 5vw, 1.75rem); font-weight: 700; line-height: 1.4; margin-bottom: 0.85rem; color: #0d0d0d; }
  .entry-meta { font-size: 0.78rem; color: #aaa; }
  .entry-meta span + span::before { content: ' / '; margin: 0 0.3em; }
  .empty-state { text-align: center; padding: 8rem 2rem; color: #bbb; font-size: 0.9rem; }
  .article-wrap { padding-top: 52px; max-width: 640px; margin: 0 auto; padding-left: 1.5rem; padding-right: 1.5rem; padding-bottom: 6rem; }
  .article-header { text-align: center; padding: 3.5rem 0 2.5rem; border-bottom: 1px solid #ebebeb; margin-bottom: 2.5rem; }
  .article-header h1 { font-family: 'Noto Serif SC', serif; font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 700; line-height: 1.4; margin-bottom: 0.9rem; }
  .article-header .meta { font-size: 0.78rem; color: #aaa; }
  .article-header .meta span + span::before { content: ' / '; margin: 0 0.3em; }
  .article-body { font-size: 1rem; line-height: 2; color: #333; }
  .article-body p { margin-bottom: 1.5em; }
  .back-btn { display: inline-block; margin: 1.8rem 0 0; font-size: 0.8rem; color: #bbb; background: none; border: none; font-family: inherit; cursor: pointer; padding: 0; }
  .write-wrap { padding-top: 52px; max-width: 680px; margin: 0 auto; padding-left: 1.5rem; padding-right: 1.5rem; padding-bottom: 5rem; }
  .auth-box { max-width: 340px; margin: 5rem auto; text-align: center; }
  .auth-box h3 { font-family: 'Noto Serif SC', serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
  .auth-box p { font-size: 0.82rem; color: #aaa; margin-bottom: 1.8rem; }
  label { display: block; font-size: 0.78rem; color: #999; margin-bottom: 0.3rem; }
  input[type="text"], input[type="password"], input[type="date"], textarea { width: 100%; background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 0.6rem 0.8rem; font-family: inherit; font-size: 0.9rem; color: #111; outline: none; margin-bottom: 1rem; }
  input:focus, textarea:focus { border-color: #111; }
  textarea { resize: vertical; min-height: 260px; line-height: 1.9; }
  .field { margin-bottom: 1.1rem; } .field label { margin-bottom: 0.3rem; } .field input, .field textarea { margin-bottom: 0; }
  .btn { display: inline-block; padding: 0.52rem 1.4rem; border-radius: 4px; border: none; font-family: inherit; font-size: 0.85rem; cursor: pointer; }
  .btn-black { background: #111; color: #fff; } .btn-black:hover { background: #333; }
  .btn-outline { background: #fff; color: #555; border: 1px solid #ddd; } .btn-outline:hover { background: #f5f5f5; }
  .btn-red { background: #d0302a; color: #fff; }
  .form-row { display: flex; gap: 1rem; } .form-row .field { flex: 1; }
  .panel-title { font-family: 'Noto Serif SC', serif; font-size: 1.2rem; font-weight: 700; margin: 2.5rem 0 0.3rem; }
  .panel-sub { font-size: 0.82rem; color: #aaa; margin-bottom: 2rem; }
  .post-list-admin { margin-top: 3rem; border-top: 1px solid #ebebeb; padding-top: 2rem; }
  .admin-section-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: #bbb; margin-bottom: 1rem; }
  .admin-row { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 0; border-bottom: 1px solid #f0f0f0; gap: 1rem; }
  .admin-row .ptitle { font-size: 0.9rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .admin-row .pmeta { font-size: 0.75rem; color: #bbb; margin-top: 0.15rem; }
  .admin-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
  .btn-sm { padding: 0.25rem 0.65rem; font-size: 0.75rem; }
  .error-msg { font-size: 0.8rem; color: #c0392b; margin-bottom: 0.8rem; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(8px); background: #111; color: #fff; padding: 0.55rem 1.4rem; border-radius: 20px; font-size: 0.82rem; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .logout-btn { background: none; border: none; font-family: inherit; font-size: 0.75rem; color: #ccc; cursor: pointer; margin-left: auto; padding: 0; }
  @media (max-width: 480px) { .article-entry { padding: 2.5rem 1.5rem; } .form-row { flex-direction: column; gap: 0; } nav { padding: 0 1.2rem; } }
</style>
</head>
